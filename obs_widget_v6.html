<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS 댓글 랭킹 위젯 v6</title>
    <style>

        /* 맨 위 고정 댓글 강조 디자인 */
        .highlight-item {
            background-color: #ffeb3b !important; /* 노란색 배경 (원하는 색으로 변경 가능) */
            border: 2px solid #fbc02d;
            font-weight: bold;
        }
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body {
            background-color: transparent !important;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            font-family: 'Pretendard', sans-serif;
            color: #ffffff;
        }

        #widget-container {
            width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 12px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 16px;
            box-sizing: border-box;
        }

        /* 헤더 부분 좌우 정렬을 위한 flex 속성 */
        .widget-header {
            display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0px; text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
        }
        .widget-title { font-size: 24px; font-weight: 800; color: #ffffff; margin: 0; }
        .deadline-text { font-size: 14px; color: #ffffff; font-weight: bold; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 6px; }

        /* 댓글 목록 자체에 간격을 줘서 커트라인/다음 댓글이 서로 겹치지 않도록 함 */
        #comment-list { display: flex; flex-direction: column; gap: 10px; }

        .comment-box {
            background-color: rgba(24, 24, 24, 1); 
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            will-change: transform, opacity;
        }

        .rank-col { width: 40px; margin-right: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .rank-number { font-size: 26px; font-weight: 900; line-height: 1; }
        .rank-delta-slot { min-height: 13px; font-size: 11px; line-height: 1; margin-top: 3px; }
        .profile-pic { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; background-color: #444; margin-right: 15px; border: 1px solid #444; }
        
        .info-col { display: flex; flex-direction: column; justify-content: center; gap: 2px; flex: 1; }
        .nickname-wrapper { display: flex; align-items: center; gap: 6px; }
        .nickname { font-size: 17px; font-weight: 800; color: #FFF; }
        .highlight-badge { background-color: #76c944; color: white; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 10px; }
        .userid { font-size: 14px; color: #ffffff; font-weight: 500; }
        .post-date { font-size: 13px; color: #ffffff; }

        .up-col { display: flex; align-items: center; gap: 6px; font-size: 22px; font-weight: 900; color: #FF3B30; }
        .thumb-icon { flex-shrink: 0; }
        .up-delta-slot { font-size: 13px; font-weight: 800; }

        .delta-badge { display: inline-block; }
        .delta-up { color: #4CAF50; }
        .delta-down { color: #FF5252; }

        .pinned-comment { border: 2px solid #00BFFF; background-color: rgba(10, 25, 40, 0.95); box-shadow: 0 0 15px rgba(0, 191, 255, 0.3); }
        .pinned-badge { background-color: #00BFFF; color: #fff; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 4px; }

        /* 커트라인: 자체 높이를 가진 행으로 분리해서 위/아래 댓글에 절대 가려지지 않도록 함 */
        .cutoff-row {
            position: relative;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cutoff-row::before {
            content: "";
            position: absolute;
            left: 0; right: 0; top: 50%;
            height: 2px;
            background-color: #FF1744;
            box-shadow: 0 0 8px #FF1744;
        }
        .cutoff-text {
            position: relative;
            z-index: 1;
            background: #FF1744;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .grayed-out { filter: grayscale(100%); opacity: 0.5; }
        .grayed-out .rank-col { color: #ffffff !important; }
        .grayed-out .up-col { color: #ffffff; }

        .qr-section {
            display: none; 
            align-items: center;
            background-color: rgba(24, 24, 24, 0.85);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 12px 15px;
            margin-top: 5px;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .qr-image { width: 70px; height: 70px; background-color: white; padding: 4px; border-radius: 6px; }
        .qr-text-col { display: flex; flex-direction: column; gap: 4px; }
        .qr-desc { font-size: 15px; font-weight: 600; color: #ddd; line-height: 1.4; word-break: keep-all; white-space: pre-line; }
        .update-time { text-align: right; font-size: 13px; color: #aaa; margin-top: 2px; font-weight: 500; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div id="widget-container">
        <!-- 상단 헤더: 제목(좌) / 마감일자(우) -->
        <div class="widget-header">
            <h2 class="widget-title" id="widget-title-display">🔥 핫클립 랭킹</h2>
            <div id="deadline-display" class="deadline-text" style="display: none;"></div>
        </div>
        <div id="comment-list"></div>
        
        <div class="qr-section" id="qr-section">
            <img id="qr-code-img" class="qr-image" src="" alt="QR Code">
            <div class="qr-text-col">
                <div class="qr-desc" id="qr-desc"></div>
            </div>
        </div>

        <div class="update-time" id="update-time-display"></div>
    </div>

    <script>
// 엄지 아이콘 SVG (이모지 대신 사용, 빨간색 고정)
const THUMB_SVG = `<svg class="thumb-icon" viewBox="0 0 24 24" width="18" height="18" fill="#FF3B30" aria-hidden="true"><path d="M1 21h4V9H1v12zM23 10c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 8.59 6.59C8.22 6.95 8 7.45 8 8v11c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>`;

// key(댓글 고유 식별자) -> DOM 엘리먼트 매핑. 새로고침마다 재사용해서 깜빡임 방지
const commentElements = new Map();

// key -> { rank, upCount } : 직전 새로고침 시점의 순위/추천수. 이번 값과 비교해서 증감 뱃지를 표시하는 데 사용
const commentStats = new Map();

function rankDeltaMarkup(delta) {
    if (!delta) return '';
    if (delta > 0) return `<span class="delta-badge delta-up">▲${delta}</span>`; // 순위 숫자가 작아짐 = 순위 상승
    return `<span class="delta-badge delta-down">▼${Math.abs(delta)}</span>`;
}

function upDeltaMarkup(delta) {
    if (!delta) return '';
    if (delta > 0) return `<span class="delta-badge delta-up">+${delta}</span>`;
    return `<span class="delta-badge delta-down">${delta}</span>`;
}

// 1. 위젯 화면의 기본 정보(제목, 마감일, QR) 세팅하기
function setupWidgetUI(urlParams) {
    const title = urlParams.get('title');
    const deadline = urlParams.get('deadline');
    const qrMode = urlParams.get('qr');
    const qrText = urlParams.get('qrtext');

    if (title) {
        const titleEl = document.getElementById("widget-title-display");
        if (titleEl) titleEl.innerText = title;
    }

    const deadlineEl = document.getElementById("deadline-display");
    if (deadline && deadlineEl) {
        deadlineEl.innerText = `마감일: ${deadline}`;
        deadlineEl.style.display = "inline-block";
    }

    const qrSection = document.getElementById("qr-section");
    const qrDesc = document.getElementById("qr-desc");
    const qrImg = document.getElementById("qr-code-img");
    const linkUrl = urlParams.get('url');

    if (qrMode === 'on') {
        if (qrSection) qrSection.style.display = "flex";
        if (qrDesc && qrText) qrDesc.innerText = qrText;

        // QR 이미지 자체는 서버가 넘겨주지 않으므로, "내 댓글 링크"를 그대로
        // QR 생성 API에 넘겨서 위젯에서 직접 QR 코드를 만들어 붙임
        if (qrImg && linkUrl) {
            qrImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=5&data=${encodeURIComponent(linkUrl)}`;
        }
    }
}

// 2. 서버에서 실시간 댓글 데이터 가져오기
async function fetchRealComments() {
    const urlParams = new URLSearchParams(window.location.search);

    if (!window.uiSetupDone) {
        setupWidgetUI(urlParams);
        window.uiSetupDone = true;
    }

    const targetUrl = urlParams.get('url');
    if (!targetUrl) {
        console.warn("OBS 위젯: url 파라미터가 없습니다. 링크 생성기에서 다시 생성해주세요.");
        return;
    }

    const match = targetUrl.match(/#comment_noti(\d+)/);
    const targetCommentId = match ? match[1] : null;

    const cutoff = parseInt(urlParams.get('cutoff'), 10) || 0;
    const mode = urlParams.get('mode') || 'top';

    try {
        const cleanUrl = targetUrl.split('#')[0];
        const highlightParam = targetCommentId ? `&highlight=${encodeURIComponent(targetCommentId)}` : '';
        const apiUrl = `/api/comment?url=${encodeURIComponent(cleanUrl)}${highlightParam}`;

        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error(`서버 통신 오류 (${response.status})`);

        const data = await response.json();
        console.log("SOOP 원본 데이터:", data);

        renderComments(data, targetCommentId, cutoff, mode);

        const updateEl = document.getElementById("update-time-display");
        if (updateEl) {
            const now = new Date();
            updateEl.innerText = `업데이트: ${now.toLocaleTimeString('ko-KR')}`;
        }

    } catch (error) {
        console.error("데이터 로드 실패:", error);
    }
}

// 댓글 고유 key 생성 (id 우선, 없으면 닉네임+순번으로 fallback)
function getCommentKey(comment, fallbackIndex) {
    const id = comment.pCommentNo ?? comment.comment_no ?? comment.id;
    if (id !== undefined && id !== null && id !== "") return 'c:' + String(id);
    const nickname = comment.userNick || comment.user_nickname || comment.userId || "";
    return 'c:' + nickname + ':' + fallbackIndex;
}

// 3. 댓글 목록 업데이트 (지우고 다시 그리는 대신, 기존 엘리먼트 재사용 + 순서만 이동)
function renderComments(data, targetCommentId, cutoff, mode) {
    const listContainer = document.getElementById("comment-list");
    if (!listContainer) return;

    const comments = data.data || data.comment_list || data.list || data.result || [];

    if (!Array.isArray(comments) || comments.length === 0) {
        if (commentElements.size === 0 && listContainer.children.length === 0) {
            listContainer.innerHTML = `<div style="color:#999; font-size:14px;">댓글이 없거나 데이터를 불러오지 못했습니다.</div>`;
        }
        return;
    }

    if (commentElements.size === 0 && listContainer.children.length > 0) {
        listContainer.innerHTML = "";
    }

    let pinnedComment = null;

    comments.forEach((comment) => {
        const currentCommentId = String(comment.pCommentNo || comment.comment_no || comment.id || "");
        const isFlaggedHighlight = comment.isHighlight === true;
        if (!pinnedComment && ((targetCommentId && currentCommentId === targetCommentId) || (!targetCommentId && isFlaggedHighlight))) {
            pinnedComment = comment;
        }
    });

    // 추천수(좋아요) 기준 내림차순 정렬. 내 댓글도 여기 포함시켜서 아래 목록에도 실제 순위 자리에 나오게 함
    const rankedComments = [...comments].sort((a, b) => (b.likeCnt ?? 0) - (a.likeCnt ?? 0));

    // 고정 댓글의 실제 순위 (정렬된 전체 목록 내 위치)
    let pinnedRank = null;
    if (pinnedComment) {
        pinnedRank = rankedComments.indexOf(pinnedComment) + 1;
    }

    let visibleComments = rankedComments.map((c, i) => ({ comment: c, rank: i + 1 }));
    if (mode === 'around' && pinnedComment) {
        const windowSize = 3;
        const centerRank = pinnedRank;
        visibleComments = visibleComments.filter(v => Math.abs(v.rank - centerRank) <= windowSize);
    }

    // 이번 새로고침에서 보여야 할 행(row) 순서 계산
    const rows = [];

    // 상단 고정 카드 (항상 맨 위, 파란 테두리로 강조)
    if (pinnedComment) {
        const upCount = pinnedComment.likeCnt ?? pinnedComment.up_cnt ?? pinnedComment.good_cnt ?? 0;
        const prevStats = commentStats.get('pinned');
        const rankDelta = prevStats ? prevStats.rank - pinnedRank : 0;
        const upDelta = prevStats ? upCount - prevStats.upCount : 0;
        rows.push({ key: 'pinned', type: 'comment', comment: pinnedComment, rankText: pinnedRank, extraClass: 'pinned-comment', isPinned: true, rankDelta, upDelta });
        commentStats.set('pinned', { rank: pinnedRank, upCount });
    }

    // 아래 랭킹 목록: 내 댓글도 실제 순위 자리에 함께 표시됨 (위 고정 카드와는 별개의 DOM으로 관리)
    let cutoffDrawn = false;
    visibleComments.forEach(({ comment, rank }) => {
        if (cutoff > 0 && rank === cutoff + 1 && !cutoffDrawn) {
            rows.push({ key: 'cutoff-line', type: 'cutoff', cutoff });
            cutoffDrawn = true;
        }
        const isMine = comment === pinnedComment;
        const isBelowCutoff = cutoff > 0 && rank > cutoff;
        const key = 'list:' + getCommentKey(comment, rank);
        const upCount = comment.likeCnt ?? comment.up_cnt ?? comment.good_cnt ?? 0;
        const prevStats = commentStats.get(key);
        const rankDelta = prevStats ? prevStats.rank - rank : 0;
        const upDelta = prevStats ? upCount - prevStats.upCount : 0;
        const classNames = [isBelowCutoff ? 'grayed-out' : '', isMine ? 'pinned-comment' : ''].filter(Boolean).join(' ');
        rows.push({
            key,
            type: 'comment',
            comment,
            rankText: rank,
            extraClass: classNames,
            isPinned: isMine,
            rankDelta,
            upDelta
        });
        commentStats.set(key, { rank, upCount });
    });

    // 순위 변동 애니메이션(FLIP)을 위해 재배치 전 기존 엘리먼트 위치 기록
    const oldRects = new Map();
    commentElements.forEach((el, key) => {
        oldRects.set(key, el.getBoundingClientRect());
    });

    const newKeys = new Set(rows.map(r => r.key));

    // 더 이상 없어야 하는 댓글 제거
    commentElements.forEach((el, key) => {
        if (!newKeys.has(key)) {
            el.remove();
            commentElements.delete(key);
        }
    });
    commentStats.forEach((_, key) => {
        if (!newKeys.has(key)) commentStats.delete(key);
    });

    // 각 행을 생성(신규) 또는 갱신(기존)하고, 올바른 순서로 재배치
    const placed = [];
    rows.forEach(row => {
        let el = commentElements.get(row.key);
        let isNew = false;

        if (!el) {
            isNew = true;
            el = row.type === 'cutoff'
                ? createCutoffElement(row.cutoff)
                : createCommentElement(row.comment, row.rankText, row.extraClass, row.isPinned, row.rankDelta, row.upDelta);
            commentElements.set(row.key, el);
        } else if (row.type === 'comment') {
            updateCommentElement(el, row.comment, row.rankText, row.extraClass, row.isPinned, row.rankDelta, row.upDelta);
        }

        listContainer.appendChild(el); // 기존 노드면 위치만 이동
        placed.push({ el, key: row.key, isNew });
    });

    // 신규 항목은 페이드 인, 기존 항목은 순위가 실제로 바뀐 경우에만 슥 이동
    placed.forEach(({ el, key, isNew }) => {
        if (isNew) {
            el.style.transition = 'none';
            el.style.opacity = '0';
            el.style.transform = 'translateY(8px)';
            requestAnimationFrame(() => {
                el.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
                el.style.opacity = '1';
                el.style.transform = 'translateY(0)';
            });
            return;
        }

        const oldRect = oldRects.get(key);
        if (!oldRect) return;
        const newRect = el.getBoundingClientRect();
        const deltaY = oldRect.top - newRect.top;

        if (Math.abs(deltaY) > 1) {
            el.style.transition = 'none';
            el.style.transform = `translateY(${deltaY}px)`;
            void el.offsetHeight;
            requestAnimationFrame(() => {
                el.style.transition = 'transform 0.4s ease';
                el.style.transform = 'translateY(0)';
            });
        }
    });
}

function createCutoffElement(cutoff) {
    const row = document.createElement("div");
    row.className = "cutoff-row";
    row.innerHTML = `<span class="cutoff-text">${cutoff}위 컷</span>`;
    return row;
}

// 신규 댓글 엘리먼트 생성 (최초 1회만 실행, 이후엔 updateCommentElement로 내용만 갱신)
function createCommentElement(comment, rankText, extraClass, isPinned, rankDelta, upDelta) {
    const nickname = comment.userNick || comment.user_nickname || comment.userId || "알 수 없음";
    const userId = comment.userId || comment.user_id || "";
    const profileImg = comment.profileImage || comment.profile_image || "";
    const upCount = comment.likeCnt ?? comment.up_cnt ?? comment.good_cnt ?? 0;

    const box = document.createElement("div");
    box.className = `comment-box ${extraClass}`.trim();

    box.innerHTML = `
        <div class="rank-col">
            <span class="rank-number">${rankText}</span>
            <span class="rank-delta-slot">${rankDeltaMarkup(rankDelta)}</span>
        </div>
        ${profileImg ? `<img class="profile-pic" src="${profileImg}" alt="">` : `<div class="profile-pic"></div>`}
        <div class="info-col">
            <div class="nickname-wrapper">
                <span class="nickname">${escapeHtml(nickname)}</span>
                ${isPinned ? `<span class="pinned-badge">내 댓글</span>` : ""}
            </div>
            <span class="userid">${escapeHtml(userId)}</span>
        </div>
        <div class="up-col">${THUMB_SVG}<span class="up-count">${upCount}</span><span class="up-delta-slot">${upDeltaMarkup(upDelta)}</span></div>
    `;
    return box;
}

// 기존 댓글 엘리먼트 내용만 갱신 (재생성하지 않음 -> 이미지 재로딩/깜빡임 없음)
function updateCommentElement(el, comment, rankText, extraClass, isPinned, rankDelta, upDelta) {
    el.className = `comment-box ${extraClass}`.trim();

    const nickname = comment.userNick || comment.user_nickname || comment.userId || "알 수 없음";
    const userId = comment.userId || comment.user_id || "";
    const profileImg = comment.profileImage || comment.profile_image || "";
    const upCount = comment.likeCnt ?? comment.up_cnt ?? comment.good_cnt ?? 0;

    const rankEl = el.querySelector('.rank-number');
    if (rankEl && rankEl.textContent !== String(rankText)) rankEl.textContent = rankText;

    const rankDeltaEl = el.querySelector('.rank-delta-slot');
    if (rankDeltaEl) rankDeltaEl.innerHTML = rankDeltaMarkup(rankDelta);

    const nickEl = el.querySelector('.nickname');
    if (nickEl && nickEl.textContent !== nickname) nickEl.textContent = nickname;

    const userIdEl = el.querySelector('.userid');
    if (userIdEl && userIdEl.textContent !== userId) userIdEl.textContent = userId;

    const upEl = el.querySelector('.up-count');
    if (upEl && upEl.textContent !== String(upCount)) upEl.textContent = upCount;

    const upDeltaEl = el.querySelector('.up-delta-slot');
    if (upDeltaEl) upDeltaEl.innerHTML = upDeltaMarkup(upDelta);

    const img = el.querySelector('.profile-pic');
    if (img && img.tagName === 'IMG' && profileImg && img.getAttribute('src') !== profileImg) {
        img.src = profileImg;
    }

    const wrapper = el.querySelector('.nickname-wrapper');
    const badge = el.querySelector('.pinned-badge');
    if (isPinned && !badge && wrapper) {
        const span = document.createElement('span');
        span.className = 'pinned-badge';
        span.textContent = '내 댓글';
        wrapper.appendChild(span);
    } else if (!isPinned && badge) {
        badge.remove();
    }
}

function escapeHtml(str) {
    const div = document.createElement("div");
    div.innerText = String(str ?? "");
    return div.innerHTML;
}

// 5초마다 새로고침
setInterval(fetchRealComments, 5000);
fetchRealComments();
</script>
</body>
</html>
