<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS 댓글 랭킹 위젯 v6</title>
    <style>

        /* 맨 위 고정 댓글 강조 디자인 */
        .highlight-item {
            background-color: #ffeb3b !important; /* 노란색 배경 (원하는 색으로 변경 가능) */
            border: 2px solid #fbc02d;
            font-weight: bold;
            margin-bottom: 15px; /* 아래 일반 댓글들과 간격 띄우기 */
        }
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        body {
            background-color: transparent !important;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            font-family: 'Pretendard', sans-serif;
            color: #ffffff;
        }

        #widget-container { width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 12px; }

        /* 헤더 부분 좌우 정렬을 위한 flex 속성 */
        .widget-header {
            display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0px; text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
        }
        .widget-title { font-size: 24px; font-weight: 800; color: #FFD700; margin: 0; }
        .deadline-text { font-size: 14px; color: #FF5252; font-weight: bold; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 6px; }

        .comment-box {
            background-color: rgba(24, 24, 24, 0.95); 
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s ease-in-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rank-col { width: 40px; font-size: 26px; font-weight: 900; text-align: center; margin-right: 15px; }
        .profile-pic { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; background-color: #444; margin-right: 15px; border: 1px solid #444; }
        
        .info-col { display: flex; flex-direction: column; justify-content: center; gap: 2px; flex: 1; }
        .nickname-wrapper { display: flex; align-items: center; gap: 6px; }
        .nickname { font-size: 17px; font-weight: 800; color: #FFF; }
        .highlight-badge { background-color: #76c944; color: white; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 10px; }
        .userid { font-size: 14px; color: #999; font-weight: 500; }
        .post-date { font-size: 13px; color: #777; }

        .up-col { display: flex; align-items: center; gap: 6px; font-size: 22px; font-weight: 900; color: #76c944; }

        .pinned-comment { border: 2px solid #00BFFF; background-color: rgba(10, 25, 40, 0.95); box-shadow: 0 0 15px rgba(0, 191, 255, 0.3); margin-bottom: 8px; }
        .pinned-badge { background-color: #00BFFF; color: #fff; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 4px; }

        .cutoff-line { width: 100%; height: 2px; background-color: #FF1744; margin: 8px 0; box-shadow: 0 0 8px #FF1744; display: flex; justify-content: center; align-items: center; }
        .cutoff-text { background: #FF1744; color: white; font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px; margin-top: -15px; }

        .grayed-out { filter: grayscale(100%); opacity: 0.5; }
        .grayed-out .rank-col { color: #777 !important; }
        .grayed-out .up-col { color: #777; }

        .qr-section {
            display: none; 
            align-items: center;
            background-color: rgba(24, 24, 24, 0.85);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 12px 15px;
            margin-top: 5px;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s ease-in-out forwards;
            opacity: 0;
            animation-delay: 0.5s;
        }

        .qr-image { width: 70px; height: 70px; background-color: white; padding: 4px; border-radius: 6px; }
        .qr-text-col { display: flex; flex-direction: column; gap: 4px; }
        .qr-desc { font-size: 15px; font-weight: 600; color: #ddd; line-height: 1.4; word-break: keep-all; white-space: pre-line; }
        .update-time { text-align: right; font-size: 13px; color: #aaa; margin-top: 2px; font-weight: 500; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div id="widget-container">
        <!-- 상단 헤더: 제목(좌) / 마감일자(우) -->
        <div class="widget-header">
            <h2 class="widget-title" id="widget-title-display">🔥 핫클립 랭킹</h2>
            <div id="deadline-display" class="deadline-text" style="display: none;"></div>
        </div>
        <div id="comment-list"></div>
        
        <div class="qr-section" id="qr-section">
            <img id="qr-code-img" class="qr-image" src="" alt="QR Code">
            <div class="qr-text-col">
                <div class="qr-desc" id="qr-desc"></div>
            </div>
        </div>

        <div class="update-time" id="update-time-display"></div>
    </div>

    <script>
// 1. Vercel 서버에서 진짜 데이터를 가져오는 함수
// 1. Vercel 서버에서 데이터를 가져오는 함수
async function fetchRealComments() {
    const urlParams = new URLSearchParams(window.location.search);
    const targetUrl = urlParams.get('url');

    if (!targetUrl) return;

    // 💡 링크에서 하이라이트할 댓글 번호 추출 (예: #comment_noti117784175 -> 117784175)
    const match = targetUrl.match(/#comment_noti(\d+)/);
    const targetCommentId = match ? match[1] : null;

    try {
        // 서버에 요청할 때는 # 꼬리표를 떼고 깔끔한 주소만 보냅니다.
        const cleanUrl = targetUrl.split('#')[0];
        const apiUrl = `/api/comment?url=${encodeURIComponent(cleanUrl)}`;
        
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error("서버 통신 오류");
        
        const data = await response.json();
        
        // 콘솔창에 데이터 띄워두기 (SOOP 데이터 구조 파악용)
        console.log("SOOP 원본 데이터:", data);

        // 2. 데이터와 타겟 번호를 같이 넘겨서 화면에 그리기
        renderComments(data, targetCommentId);

    } catch (error) {
        console.error("데이터 로드 실패:", error);
    }
}

// 3. 댓글 화면에 그리기 (맨 위 고정 로직 포함)
function renderComments(data, targetCommentId) {
    const listContainer = document.getElementById("여기에_댓글리스트_ID입력"); // 👈 실제 HTML의 id로 변경 필수!
    if (!listContainer) return;
    listContainer.innerHTML = ""; // 기존 내용 초기화

    // SOOP API 실제 배열 경로 (data.data 등, 콘솔창 확인 후 수정 필요할 수 있음)
    const comments = data.data || data.comment_list || []; 

    let pinnedComment = null;
    let otherComments = [];

    // 💡 전체 댓글을 순회하면서 "고정할 댓글"과 "나머지 댓글"을 분리합니다.
    comments.forEach(comment => {
        // SOOP의 실제 댓글 번호 변수명 (comment_no 등) 찾아서 매칭 필요
        const currentCommentId = String(comment.comment_no || comment.c_no || comment.id || "");
        
        if (targetCommentId && currentCommentId === targetCommentId) {
            pinnedComment = comment; // 내 댓글 발견!
        } else {
            otherComments.push(comment); // 나머지는 따로 모아둠
        }
    });

    // --- 화면 그리기 시작 ---

    // 1️⃣ 고정 댓글(내 댓글)을 가장 먼저 화면 맨 위에 그립니다.
    if (pinnedComment) {
        createCommentElement(listContainer, pinnedComment, "📌", "highlight-item");
    }

    // 2️⃣ 나머지 댓글들을 그 아래에 순위대로 그립니다.
    otherComments.forEach((comment, index) => {
        // 고정 댓글이 있다면 2등부터 시작, 없다면 1등부터 시작
        const rank = pinnedComment ? index + 2 : index + 1;
        createCommentElement(listContainer, comment, rank, "normal-item");
    });
}

// 4. HTML 요소를 생성하는 헬퍼 함수
function createCommentElement(container, comment, rankText, extraClass) {
    // SOOP API의 실제 닉네임, 내용 변수명 확인 후 수정 필요
    const nickname = comment.user_nickname || comment.user_id || "알 수 없음";
    const content = comment.comment || comment.content || "내용 없음";
    
    const listItem = document.createElement("div");
    // 고정 댓글이면 특별한 클래스(highlight-item)를 추가합니다.
    listItem.className = `comment-item ${extraClass}`; 
    
    listItem.innerHTML = `
        <div class="rank">${rankText}</div>
        <div class="info">
            <span class="nickname">${nickname}</span>
            <span class="content">${content}</span>
        </div>
    `;
    container.appendChild(listItem);
}

// 5초마다 새로고침
setInterval(fetchRealComments, 5000);
fetchRealComments();
</script>
</body>
</html>
